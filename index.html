<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraPass — Elegant Password Generator</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <main class="app-container">
        <header class="app-header">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <h1>AuraPass</h1>
            </div>
            <p class="subtitle">Generate secure, customized passwords instantly.</p>
        </header>

        <section class="generator-card">
            <!-- Password Display Area -->
            <div class="output-container">
                <input type="text" id="password-display" readonly placeholder="Click Generate Below" disabled>
                <button id="copy-btn" class="copy-button" title="Copy to clipboard" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="copy-icon">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span class="tooltip" id="copy-tooltip">Copy</span>
                </button>
            </div>

            <!-- Password Strength Bar (bonus UX) -->
            <div class="strength-meter">
                <div class="strength-bar" id="strength-bar"></div>
                <span class="strength-text" id="strength-text">Strength: N/A</span>
            </div>

            <!-- Slider Control for Length -->
            <div class="control-group">
                <div class="control-label-row">
                    <label for="length-slider" class="control-title">Password Length</label>
                    <span class="length-display" id="length-val">16</span>
                </div>
                <div class="slider-wrapper">
                    <input type="range" id="length-slider" min="6" max="32" value="16" class="range-slider">
                </div>
            </div>

            <!-- Options Grid (Toggles) -->
            <div class="options-grid">
                <div class="toggle-card">
                    <div class="toggle-info">
                        <span class="toggle-title">Uppercase</span>
                        <span class="toggle-desc">A-Z characters</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="toggle-uppercase" checked>
                        <span class="slider round"></span>
                    </label>
                </div>

                <div class="toggle-card">
                    <div class="toggle-info">
                        <span class="toggle-title">Lowercase</span>
                        <span class="toggle-desc">a-z characters</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="toggle-lowercase" checked>
                        <span class="slider round"></span>
                    </label>
                </div>

                <div class="toggle-card">
                    <div class="toggle-info">
                        <span class="toggle-title">Numbers</span>
                        <span class="toggle-desc">0-9 digits</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="toggle-numbers" checked>
                        <span class="slider round"></span>
                    </label>
                </div>

                <div class="toggle-card">
                    <div class="toggle-info">
                        <span class="toggle-title">Symbols</span>
                        <span class="toggle-desc">!@#$%^&* symbols</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="toggle-symbols">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <!-- Action Button -->
            <button id="generate-btn" class="generate-button">
                <span>Generate Password</span>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-arrow">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </section>
        
        <footer class="app-footer">
            <p>Designed with secure cryptographic standards.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
